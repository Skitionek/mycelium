# Overrides base docker-compose.yml file
# to add stateful backing services (e.g. databases)
version: "3.8"

services:
  # PostgreSQL database
  postgres:
    image: postgres:13
    restart: unless-stopped
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-q"]
      start_period: 10s

  ## Neo4j graph database (used for graph-visualiser and full-text-search)
  neo4j:
    image: neo4j:4.4-community
    restart: unless-stopped
    container_name: neo4j
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4JLABS_PLUGINS=["apoc"]
    ports:
      - 7687:7687
      - 7474:7474
    volumes:
      - neo4j:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD", "wget", "localhost:7474", "-O", "-"]
      start_period: 1m

  ## Ekasticsearch search engine
  elasticsearch:
    image: ghcr.io/sbrg/lifelike-elasticsearch:7.16.3
    restart: unless-stopped
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
    ports:
      - 9200
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "curl", "-f", "localhost:9200/_cluster/health"]
      start_period: 1m

  redis:
    image: redis:alpine
    restart: unless-stopped
    container_name: redis
    ports:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  appserver:
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - NEO4J_HOST=neo4j
      - NEO4J_AUTH=neo4j/password
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_HOST=redis
      - MOZG_URL=http://mozg:4000/graphql
    depends_on:
      - postgres
      - neo4j
      - elasticsearch
      - mozg

  statistical-enrichment:
    environment:
      - NEO4J_HOST=neo4j
      - NEO4J_AUTH=neo4j/password
      - REDIS_HOST=redis
      - MOZG_URL=http://mozg:4000/graphql
    depends_on:
      - neo4j
      - redis
      - mozg

  cache-invalidator:
    environment:
      - NEO4J_HOST=neo4j
      - NEO4J_AUTH=neo4j/password
      - REDIS_HOST=redis
      - MOZG_URL=http://mozg:4000/graphql
    depends_on:
      - neo4j
      - redis
      - mozg

  ## Mozg – cross-database GraphQL knowledge-graph query layer
  ## Replaces the direct Neo4j knowledge-graph (graph-db) for enrichment queries.
  ## See mozg/README.md for details.
  mozg:
    build:
      context: ../mozg
    restart: unless-stopped
    container_name: mozg
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://localhost:4000/graphql?query=%7B__typename%7D",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres:
  neo4j:
  elasticsearch:
